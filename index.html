<!DOCTYPE html>
<html>
<head><title>Data Types</title></head>
<body>

<h1>Data Types</h1>

<h2>String</h2>
<p id="s1"></p>

<h2>Number</h2>
<p id="s2"></p>

<h2>Boolean</h2>
<p id="s3"></p>

<h2>Array</h2>
<p id="s4"></p>

<h2>Object</h2>
<p id="s5"></p>

<h2>Null & Undefined</h2>
<p id="s6"></p>

<script>
let name = "Rahul";
document.getElementById("s1").innerText = typeof name + ": " + name;

let age = 21;
document.getElementById("s2").innerText = typeof age + ": " + age;

let passed = true;
document.getElementById("s3").innerText = typeof passed + ": " + passed;

let fruits = ["Apple", "Banana", "Mango"];
document.getElementById("s4").innerText = typeof fruits + ": " + fruits.join(", ");

let student = { name: "Priya", age: 20 };
document.getElementById("s5").innerText = typeof student + ": " + student.name + ", " + student.age;

let x = null;
let y;
document.getElementById("s6").innerText = "null: " + x + " | undefined: " + y;
</script>

</body>
</html>
